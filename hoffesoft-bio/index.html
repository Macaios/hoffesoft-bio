<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoffesoft | Soluções Digitais</title>
  <meta name="description" content="Hoffesoft — Soluções digitais para food, clínicas, varejo e muito mais. Clique e conheça nossos sistemas." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d14;
      --surface:   #111622;
      --border:    rgba(255,255,255,0.08);
      --text:      #e8eaf0;
      --muted:     #8890a4;
      --accent:    #3b6bff;
      --accent2:   #6c3bff;
      --hover-bg:  rgba(59,107,255,0.12);
      --radius:    18px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: float 8s ease-in-out infinite alternate;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #3b6bff, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #6c3bff, transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Layout */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
    }
    .avatar-ring {
      width: 104px; height: 104px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 32px rgba(59,107,255,0.4);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 24px rgba(59,107,255,0.35); }
      50%       { box-shadow: 0 0 48px rgba(59,107,255,0.6); }
    }
    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    /* Header text */
    .header { text-align: center; }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 0.97rem;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(59,107,255,0.5);
      box-shadow: 0 8px 32px rgba(59,107,255,0.2);
      background: var(--hover-bg);
    }
    .link-btn:hover::before { opacity: 0.05; }
    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(59,107,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.4rem;
      position: relative; z-index: 1;
      transition: background 0.18s ease;
    }
    .link-btn:hover .link-icon { background: rgba(59,107,255,0.3); }

    .link-info { position: relative; z-index: 1; flex: 1; min-width: 0; }
    .link-info .label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 2px;
    }
    .link-info .title { font-weight: 600; }

    /* Sub-hint para o botão de outros segmentos */
    .link-info .hint {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 3px;
      line-height: 1.35;
      opacity: 0.75;
    }

    .link-arrow {
      margin-left: auto;
      position: relative; z-index: 1;
      color: var(--muted);
      font-size: 1.1rem;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    .link-btn:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 22px;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(.17,.67,.35,1.2), opacity 0.3s;
      opacity: 0;
      z-index: 999;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Footer */
    .footer {
      font-size: 0.75rem;
      color: rgba(136,144,164,0.4);
      text-align: center;
    }
    .footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.18s ease;
    }
    .footer a:hover {
      color: rgba(136,144,164,0.75);
    }

    /* Ripple */
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple-el {
      position: absolute;
      border-radius: 50%;
      background: rgba(59,107,255,0.25);
      pointer-events: none;
      animation: ripple 0.55s linear forwards;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <img class="avatar" src="logo.png" alt="Hoffesoft Logo" />
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <h1>Hoffesoft</h1>
      <p>Ecosistema inteligente para empresas ✦</p>
    </div>

    <!-- Links -->
    <div class="links">

      <!-- Botão 1: Bares e Restaurantes -->
      <a id="btn-food"
         class="link-btn"
         href="https://hoffesoft.com.br/food"
         target="_blank"
         rel="noopener"
         data-label="Bares e Restaurantes"
         data-key="food">
        <div class="link-icon">🍽️</div>
        <div class="link-info">
          <span class="label">Sistema para food service</span>
          <span class="title">Bares e Restaurantes</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 2: Clínicas e Consultórios -->
      <a id="btn-clinicas"
         class="link-btn"
         href="https://hoffesoft.com.br/clinicas"
         target="_blank"
         rel="noopener"
         data-label="Clínicas e Consultórios"
         data-key="clinicas">
        <div class="link-icon">🏥</div>
        <div class="link-info">
          <span class="label">Gestão para saúde</span>
          <span class="title">Clínicas e Consultórios</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 3: Lojas e Varejo -->
      <a id="btn-varejo"
         class="link-btn"
         href="https://hoffesoft.com.br/varejo"
         target="_blank"
         rel="noopener"
         data-label="Lojas e Varejo"
         data-key="varejo">
        <div class="link-icon">🛍️</div>
        <div class="link-info">
          <span class="label">Módulo Web</span>
          <span class="title">Lojas e Varejo</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 4: Outros Segmentos / WhatsApp -->
      <a id="btn-whatsapp"
         class="link-btn"
         href="https://wa.me/558382021030?text=Ol%C3%A1!%20Vim%20pelo%20Instagram%20e%20gostaria%20de%20saber%20mais%20sobre%20os%20sistemas%20da%20Hoffesoft."
         target="_blank"
         rel="noopener"
         data-label="Outros Segmentos"
         data-key="whatsapp"
         style="border-color: rgba(37,211,102,0.25);">
        <div class="link-icon" style="background: rgba(37,211,102,0.15); font-size: 1.5rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#25D366" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.856L.057 23.215a.75.75 0 0 0 .93.903l5.4-1.498A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.686-.528-5.204-1.443l-.372-.22-3.853 1.069 1.036-3.783-.242-.386A9.959 9.959 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          </svg>
        </div>
        <div class="link-info">
          <span class="label">Outros Segmentos</span>
          <span class="title">Fale no WhatsApp</span>
        </div>
        <span class="link-arrow" style="color: #25D366;">›</span>
      </a>

    </div>

    <!-- Footer -->
    <p class="footer">
      <a href="https://hoffesoft.com.br" target="_blank" rel="noopener">hoffesoft.com.br</a>
    </p>

  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
  // ─── Rastreamento de cliques (interno — não exibido ao usuário) ───────────
  const STORE_KEY = 'hf_clicks';

  function getClicks() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveClick(key) {
    const data = getClicks();
    data[key] = (data[key] || 0) + 1;
    data[key + '_last'] = new Date().toISOString();
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    return data[key];
  }

  // ─── Efeito ripple ────────────────────────────────────────────────────────
  function addRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const el = document.createElement('span');
    el.className = 'ripple-el';
    el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(el);
    setTimeout(() => el.remove(), 600);
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Bind em todos os botões ──────────────────────────────────────────────
  document.querySelectorAll('.link-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      addRipple(this, e);
      const key   = this.dataset.key;
      const label = this.dataset.label;
      saveClick(key); // salva internamente, sem exibir ao usuário
      showToast('✓ Abrindo ' + label + '…');

      // Envia evento para analytics (se ativo)
      if (typeof window.umami !== 'undefined') {
        window.umami.track('click_' + key);
      }
      if (typeof window.gtag !== 'undefined') {
        window.gtag('event', 'click', { event_category: 'bio_link', event_label: key });
      }
    });
  });

  // ─── Painel de stats interno (console apenas) — rode hf_stats() no console
  window.hf_stats = function() {
    const d = getClicks();
    console.table(
      Object.keys(d)
        .filter(k => !k.endsWith('_last'))
        .map(k => ({ link: k, cliques: d[k], último: d[k+'_last'] || '—' }))
    );
  };
</script>

</body>
</html>
