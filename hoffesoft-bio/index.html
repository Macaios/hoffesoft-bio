<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoffesoft | Soluções Digitais</title>
  <meta name="description" content="Hoffesoft — Soluções digitais para food, clínicas, varejo e muito mais. Clique e conheça nossos sistemas." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Paleta navy inspirada no hoffesoft.com.br */
      --bg:        #08111f;
      --bg2:       #0d1a2e;
      --surface:   #112240;
      --surface2:  #172d50;
      --border:    rgba(255,255,255,0.07);
      --border-hi: rgba(255,255,255,0.14);
      --text:      #e9edf5;
      --muted:     #7a8fad;
      --accent:    #1e5cff;
      --accent2:   #0a3fa8;
      --accent-hi: #4a7dff;
      --hover-bg:  rgba(30,92,255,0.1);
      --radius:    16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grid overlay — inspired by enterprise navy sites */
    body {
      background-image:
        linear-gradient(rgba(30,92,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,92,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Blobs de luz (mais contidos e navy) */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      animation: float 10s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1e5cff, transparent 65%);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #0a3fa8, transparent 65%);
      bottom: -100px; right: -100px;
      animation-delay: -5s;
    }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(25px, 15px) scale(1.06); }
    }

    /* Layout */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ─── Logo / Avatar ─────────────────────────────────── */
    .avatar-wrap { position: relative; }

    .avatar-ring {
      width: 108px; height: 108px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent-hi), var(--accent2));
      position: relative;
    }
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(30,92,255,0.2);
      animation: ping 3s ease-in-out infinite;
    }
    @keyframes ping {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0; transform: scale(1.12); }
    }

    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    /* ─── Header ────────────────────────────────────────── */
    .header { text-align: center; }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #ffffff;
    }

    .header .tagline {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* Divider linha navy */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 0 auto;
      opacity: 0.6;
    }

    /* ─── Botões ─────────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    /* Barra de acento lateral — característica do estilo corporate navy */
    .link-btn::after {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-hi), var(--accent2));
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px) translateX(1px);
      border-color: var(--border-hi);
      box-shadow:
        0 8px 28px rgba(0,0,0,0.35),
        0 0 0 1px rgba(30,92,255,0.15);
      background: var(--surface2);
    }
    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0) translateX(0); }

    .link-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: rgba(30,92,255,0.12);
      border: 1px solid rgba(30,92,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
      position: relative; z-index: 1;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .link-btn:hover .link-icon {
      background: rgba(30,92,255,0.22);
      border-color: rgba(30,92,255,0.3);
    }

    .link-info {
      position: relative; z-index: 1;
      flex: 1; min-width: 0;
    }
    .link-info .label {
      display: block;
      font-size: 0.73rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .link-info .title {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-info .hint {
      display: block;
      font-size: 0.71rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 3px;
      line-height: 1.4;
      opacity: 0.8;
      white-space: normal;
    }

    .link-arrow {
      margin-left: auto;
      position: relative; z-index: 1;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
      transition: transform 0.2s ease, color 0.2s ease;
      flex-shrink: 0;
    }
    .link-btn:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent-hi);
    }

    /* ─── WhatsApp — destaque verde controlado ──────────── */
    .btn-wa {
      border-color: rgba(37,211,102,0.18) !important;
    }
    .btn-wa::after {
      background: linear-gradient(180deg, #25D366, #1aab52) !important;
    }
    .btn-wa:hover {
      box-shadow:
        0 8px 28px rgba(0,0,0,0.35),
        0 0 0 1px rgba(37,211,102,0.15) !important;
    }



    /* ─── Footer ─────────────────────────────────────────── */
    .footer {
      font-size: 0.73rem;
      color: rgba(122,143,173,0.35);
      text-align: center;
      letter-spacing: 0.02em;
    }
    .footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer a:hover {
      color: rgba(122,143,173,0.65);
    }

    /* ─── Ripple ─────────────────────────────────────────── */
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple-el {
      position: absolute;
      border-radius: 50%;
      background: rgba(30,92,255,0.2);
      pointer-events: none;
      animation: ripple 0.6s linear forwards;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <img class="avatar" src="logo.png" alt="Hoffesoft Logo" />
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <h1>Hoffesoft</h1>
      <p class="tagline">Ecosistema Inteligente para Empresas ✦</p>
    </div>


    <!-- Links -->
    <div class="links">

      <!-- Botão 1: Bares e Restaurantes -->
      <a id="btn-food"
         class="link-btn"
         href="https://hoffesoft.com.br/food"
         target="_blank"
         rel="noopener"
         data-label="Bares e Restaurantes"
         data-key="food">
        <div class="link-icon">🍽️</div>
        <div class="link-info">
          <span class="label">Sistema para food service</span>
          <span class="title">Bares e Restaurantes</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 2: Clínicas e Consultórios -->
      <a id="btn-clinicas"
         class="link-btn"
         href="https://hoffesoft.com.br/clinicas"
         target="_blank"
         rel="noopener"
         data-label="Clínicas e Consultórios"
         data-key="clinicas">
        <div class="link-icon">🏥</div>
        <div class="link-info">
          <span class="label">Gestão para saúde</span>
          <span class="title">Clínicas e Consultórios</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 3: Lojas e Varejo -->
      <a id="btn-varejo"
         class="link-btn"
         href="https://hoffesoft.com.br/varejo"
         target="_blank"
         rel="noopener"
         data-label="Lojas e Varejo"
         data-key="varejo">
        <div class="link-icon">🛍️</div>
        <div class="link-info">
          <span class="label">Módulo Web</span>
          <span class="title">Lojas e Varejo</span>
        </div>
        <span class="link-arrow">›</span>
      </a>

      <!-- Botão 4: Outros Segmentos / WhatsApp -->
      <a id="btn-whatsapp"
         class="link-btn btn-wa"
         href="https://wa.me/558382021030?text=Ol%C3%A1!%20Vim%20pelo%20Instagram%20e%20gostaria%20de%20saber%20mais%20sobre%20os%20sistemas%20da%20Hoffesoft."
         target="_blank"
         rel="noopener"
         data-label="Outros Segmentos"
         data-key="whatsapp">
        <div class="link-icon" style="background: rgba(37,211,102,0.1); border-color: rgba(37,211,102,0.18);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#25D366" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.856L.057 23.215a.75.75 0 0 0 .93.903l5.4-1.498A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.686-.528-5.204-1.443l-.372-.22-3.853 1.069 1.036-3.783-.242-.386A9.959 9.959 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          </svg>
        </div>
        <div class="link-info">
          <span class="label">Outros Segmentos</span>
          <span class="title">Fale no WhatsApp</span>
        </div>
        <span class="link-arrow" style="color: #25D366;">›</span>
      </a>

    </div>

    <!-- Footer -->
    <p class="footer">
      <a href="https://hoffesoft.com.br" target="_blank" rel="noopener">hoffesoft.com.br</a>
    </p>

  </div>
</div>



<script>
  // ─── Rastreamento interno (não visível ao usuário) ─────────────────────────
  const STORE_KEY = 'hf_clicks_v2';

  function getClicks() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveClick(key) {
    const data = getClicks();
    data[key] = (data[key] || 0) + 1;
    data[key + '_last'] = new Date().toISOString();
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    return data[key];
  }

  // ─── Efeito ripple ─────────────────────────────────────────────────────────
  function addRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const el = document.createElement('span');
    el.className = 'ripple-el';
    el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(el);
    setTimeout(() => el.remove(), 650);
  }



  // ─── Bind ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.link-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      addRipple(this, e);
      const key   = this.dataset.key;
      const label = this.dataset.label;
      saveClick(key);

      if (typeof window.umami !== 'undefined') window.umami.track('click_' + key);
      if (typeof window.gtag !== 'undefined')  window.gtag('event', 'click', { event_category: 'bio_link', event_label: key });
    });
  });

  // ─── Debug console: hf_stats() ─────────────────────────────────────────────
  window.hf_stats = function() {
    const d = getClicks();
    console.table(
      Object.keys(d)
        .filter(k => !k.endsWith('_last'))
        .map(k => ({ link: k, cliques: d[k], último: d[k+'_last'] || '—' }))
    );
  };
</script>

</body>
</html>
